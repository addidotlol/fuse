version: "3"

vars:
  BINARY: fuse.exe
  MODULE: github.com/addidotlol/fuse
  GOARCH:
    sh: go env GOARCH

tasks:
  default:
    desc: Build the project
    cmds:
      - task: build

  build:
    desc: Build the fuse binary
    deps: [mkrsrc]
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
      - tray/icon.ico
    generates:
      - "{{.BINARY}}"
    cmds:
      - go build -ldflags "-H=windowsgui" -o {{.BINARY}} .

  mkrsrc:
    desc: Generate Windows resource file for exe icon
    sources:
      - tray/icon.ico
    generates:
      - rsrc_windows_{{.GOARCH}}.syso
    cmds:
      - go run github.com/akavel/rsrc@v0.10.2 -arch {{.GOARCH}} -ico tray/icon.ico -o rsrc_windows_{{.GOARCH}}.syso

  run:
    desc: Build and run fuse
    deps: [build]
    cmds:
      - ./{{.BINARY}}

  dev:
    desc: Run with file watching (requires air)
    cmds:
      - air

  tidy:
    desc: Tidy and verify go modules
    cmds:
      - go mod tidy
      - go mod verify

  fmt:
    desc: Format all Go source files
    cmds:
      - gofmt -s -w .

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  check:
    desc: Run fmt, vet, and tests
    cmds:
      - task: fmt
      - task: vet
      - task: test

  mkicon:
    desc: Generate the tray icon from icon.svg
    sources:
      - icon.svg
      - cmd/mkicon/main.go
    generates:
      - tray/icon.go
    cmds:
      - go run ./cmd/mkicon

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY}}
      - rm -f fuse.log
      - rm -f rsrc_windows_{{.GOARCH}}.syso
